---
include:
    - acls.yaml

vlans:
    vlan_alumnos:
        vid: 100
        description: "VLAN de alumnos"
        faucet_vips: ["10.100.0.1/20"]
        acls_in: [acl_alumnos]
    vlan_docentes:
        vid: 200
        description: "VLAN de docentes"
        faucet_vips: ["10.200.0.1/22"]
        acls_in: [acl_docentes]
    vlan_administrativos:
        vid: 300
        description: "VLAN de administrativos"
        faucet_vips: ["10.30.0.1/24"]
        acls_in: [acl_administrativos]
    vlan_invitados:
        vid: 400
        description: "VLAN de invitados"
        faucet_vips: ["10.40.0.1/24"]
        acls_in: [acl_invitados]
    vlan_superadmin:
        vid: 500
        description: "VLAN de superadministrador"
        faucet_vips: ["10.50.0.1/26"]
    vlan_servidores:
        vid: 900
        description: "VLAN de servidores"
        faucet_vips: ["10.0.1.1/24"]
    vlan_buffer:
        vid: 920
        description: "VLAN interna buffer no enrutable"
    vlan_externa:
        vid: 910
        description: "VLAN externa internet simulado y atacante"
    vlan_cuarentena:
        vid: 999
        description: "VLAN de cuarentena pre-autenticacion"
        acls_in: [acl_cuarentena]

routers:
    router_campus:
        vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                vlan_invitados, vlan_servidores]

dps:
    sw-gateway:
        dp_id: 0x000096090f9b524c
        hardware: "Open vSwitch"
        interfaces:
            1:
                name: "ens9"
                description: "mirror hacia nodo-sec ens5"
                output_only: true
            2:
                name: "ens6"
                description: "trunk uplink A hacia sw-core1 ens8"
                tagged_vlans: [vlan_alumnos, vlan_docentes,
                               vlan_administrativos, vlan_invitados,
                               vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]
            3:
                name: "ens7"
                description: "vm-atacante ens4 VLAN910"
                native_vlan: vlan_externa
            4:
                name: "ens5"
                description: "vm-simulacion-internet ens4 VLAN910"
                native_vlan: vlan_externa
            6:
                name: "ens8"
                description: "trunk uplink B hacia sw-core2 ens8"
                tagged_vlans: [vlan_alumnos, vlan_docentes,
                               vlan_administrativos, vlan_invitados,
                               vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]

    sw-core1:
        dp_id: 0x00007e9b3799d343
        hardware: "Open vSwitch"
        stack:
            priority: 1
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            3:
                name: "ens7"
                description: "enlace A hacia sw-servidores ens4 VLAN900"
                native_vlan: vlan_servidores
            4:
                name: "ens8"
                description: "trunk uplink A desde sw-gateway ens6"
                tagged_vlans: [vlan_alumnos, vlan_docentes,
                               vlan_administrativos, vlan_invitados,
                               vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]
            5:
                name: "ens9"
                description: "enlace A hacia nodo-auth ens4 VLAN999"
                native_vlan: vlan_cuarentena
            12:
                name: "ens4"
                description: "stack simplificado hacia sw-acc1 OF10"
                stack:
                    dp: sw-acc1
                    port: 10
    sw-acc1:
        dp_id: 0x000092d8d9854f4c
        hardware: "Open vSwitch"
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            2:
                name: "ens8"
                description: "h1 ens4 acceso dinamico"
                native_vlan: vlan_cuarentena
                acls_in: [acl_cuarentena]
            7:
                name: "ens9"
                description: "h2 ens4 acceso dinamico"
                native_vlan: vlan_alumnos
                acls_in: [acl_cuarentena]
            10:
                name: "ens4"
                description: "stack simplificado hacia sw-core1 OF12"
                stack:
                    dp: sw-core1
                    port: 12
            11:
                name: "vlan999"
                description: "portal cautivo interno sw-acc1"
                native_vlan: vlan_cuarentena

            12:
                name: "dhcp-trunk"
                description: "trunk DHCP/DNS NFV multi-vlan"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_buffer]
    sw-servidores:
        dp_id: 0x0000ea33258def43
        hardware: "Open vSwitch"
        interfaces:
            1:
                name: "ens4"
                description: "enlace A desde sw-core1 ens7 VLAN900"
                native_vlan: vlan_servidores
            2:
                name: "ens5"
                description: "enlace B desde sw-core2 ens7 VLAN900"
                native_vlan: vlan_servidores
            3:
                name: "srv-ovs"
                description: "enlace interno hacia br-srv y namespaces de recursos"
                native_vlan: vlan_servidores