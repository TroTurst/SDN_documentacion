---
include:
    - acls.yaml

vlans:
    vlan_alumnos:
        vid: 100
        faucet_vips: ["10.100.0.1/20"]
        faucet_mac: "0e:00:00:00:01:00"
        acls_in: [acl_alumnos]
    vlan_docentes:
        vid: 200
        faucet_vips: ["10.200.0.1/22"]
        faucet_mac: "0e:00:00:00:02:00"
        acls_in: [acl_docentes]
    vlan_administrativos:
        vid: 300
        faucet_vips: ["10.30.0.1/24"]
        faucet_mac: "0e:00:00:00:03:00"
        acls_in: [acl_administrativos]
    vlan_invitados:
        vid: 400
        faucet_vips: ["10.40.0.1/24"]
        faucet_mac: "0e:00:00:00:04:00"
        acls_in: [acl_invitados]
    vlan_superadmin:
        vid: 500
        faucet_vips: ["10.50.0.1/26"]
        faucet_mac: "0e:00:00:00:05:00"
    vlan_servidores:
        vid: 900
        faucet_vips: ["10.0.1.1/24"]
        faucet_mac: "0e:00:00:00:09:00"
    vlan_buffer:
        vid: 920
    vlan_externa:
        vid: 910
    vlan_cuarentena:
        vid: 999
        faucet_mac: "0e:00:00:00:09:99"
        acls_in: [acl_cuarentena]

routers:
    router_campus:
        vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                vlan_invitados, vlan_servidores]

dps:
    sw-gateway:
        dp_id: 0x000096090f9b524c
        hardware: "Open vSwitch"
        interfaces:
            1:
                name: "ens9"
                output_only: true
            2:
                name: "ens6"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]
            3:
                name: "ens7"
                native_vlan: vlan_externa
            4:
                name: "ens5"
                native_vlan: vlan_externa
            6:
                name: "ens8"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]

    sw-core1:
        dp_id: 0x00007e9b3799d343
        hardware: "Open vSwitch"
        stack:
            priority: 1
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            3:
                name: "ens7"
                native_vlan: vlan_servidores
            4:
                name: "ens8"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]
            5:
                name: "ens9"
                native_vlan: vlan_cuarentena
            9:
                name: "ens6"
                stack:
                    dp: sw-core2
                    port: 3
            12:
                name: "ens4"
                stack:
                    dp: sw-acc1
                    port: 10

    sw-core2:
        dp_id: 0x000032c630327e45
        hardware: "Open vSwitch"
        stack:
            priority: 2
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            1:
                name: "ens4"
                stack:
                    dp: sw-acc1
                    port: 5
            3:
                name: "ens6"
                stack:
                    dp: sw-core1
                    port: 9
            4:
                name: "ens7"
                native_vlan: vlan_servidores
            5:
                name: "ens8"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_servidores,
                               vlan_buffer, vlan_cuarentena]
            6:
                name: "ens9"
                native_vlan: vlan_cuarentena

    sw-acc1:
        dp_id: 0x000092d8d9854f4c
        hardware: "Open vSwitch"
        stack:
            priority: 3
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            2:
                name: "ens8"
                description: "h1 ens4 acceso dinamico"
                native_vlan: vlan_cuarentena
                acls_in: [acl_cuarentena]
            5:
                name: "ens6"
                stack:
                    dp: sw-core2
                    port: 1
            7:
                name: "ens9"
                description: "h2 ens4 acceso dinamico"
                native_vlan: vlan_cuarentena
                acls_in: [acl_cuarentena]
            10:
                name: "ens4"
                stack:
                    dp: sw-core1
                    port: 12
            12:
                name: "dhcp-trunk"
                description: "trunk DHCP/DNS NFV multi-vlan"
                tagged_vlans: [vlan_alumnos, vlan_docentes, vlan_administrativos,
                               vlan_invitados, vlan_superadmin, vlan_buffer]

    sw-servidores:
        dp_id: 0x0000ea33258def43
        hardware: "Open vSwitch"
        stack:
            priority: 4
        lldp_beacon:
            send_interval: 5
            max_per_interval: 5
        interfaces:
            1:
                name: "ens4"
                stack:
                    dp: sw-core1
                    port: 3
            2:
                name: "ens5"
                stack:
                    dp: sw-core2
                    port: 4
            5:
                name: "administracion"
                native_vlan: vlan_servidores
            6:
                name: "investigacion"
                native_vlan: vlan_servidores
            7:
                name: "gest_acad"
                native_vlan: vlan_servidores
            8:
                name: "bib_digital"
                native_vlan: vlan_servidores